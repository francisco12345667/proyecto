<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - CNA</title>
    <link rel="stylesheet" href="../css/estilos.css">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="logo-text">Victoria <span>Educativa</span></div>
            <nav><ul><li><a href="../index.html">Inicio</a></li></ul></nav>
        </div>
    </header>

    <main class="ia-wrapper" style="max-width: 600px; padding: 3rem;">
        <h2 style="text-align: center; color: var(--cna-rojo); border:none;">Ponte en Contacto</h2>
        <p style="text-align: center; margin-bottom: 2rem;">¿Tienes aportes sobre la historia documental de la Cruzada? Escríbenos.</p>
        
        <form id="form-contacto">
            <div style="margin-bottom: 1rem;">
                <label style="display:block; font-weight:bold;">Nombre</label>
                <input type="text" required style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display:block; font-weight:bold;">Correo</label>
                <input type="email" required style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div style="margin-bottom: 1rem;">
                <label style="display:block; font-weight:bold;">Mensaje</label>
                <textarea rows="5" required style="width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; resize: vertical;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Enviar Mensaje</button>
            <div id="msg-exito" style="display:none; color: green; margin-top: 1rem; text-align: center; font-weight: bold;">¡Mensaje enviado con éxito!</div>
        </form>
    </main>

    <script>
        document.getElementById('form-contacto').addEventListener('submit', (e) => {
            e.preventDefault();
            document.getElementById('msg-exito').style.display = 'block';
            e.target.reset();
            setTimeout(() => { document.getElementById('msg-exito').style.display = 'none'; }, 3000);
        });
    </script>
</body>
</html>
